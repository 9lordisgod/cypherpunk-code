name: Marketing Daily Posts

on:
  schedule:
    - cron: "0 14 * * *" # 9:00 AM America/Toronto (EST, UTC-5)
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r tools/marketing-manager/requirements.txt

      - name: Send 2 daily posts to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tools/marketing-manager/main.py --force